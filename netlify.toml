[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["bcryptjs"]

# Route /api/* to the Express-wrapped function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# SPA fallback (serve index.html for any path not matched above)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
